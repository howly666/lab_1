<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Лабораторная работа 4</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="CSS/style.css">

  <script src="JavaScript/image.js"  defer></script>
  <script src="JavaScript/path.js"   defer></script>
  <script src="JavaScript/main.js"   defer></script>
</head>
<body>


  <div class="layout">

    <div class="panel">

      <div id="block-coords" class="block">
        <div class="block-title">Координаты рисунка</div>
        <div class="row">
          <label>x:</label>
          <input type="number" id="cx" value="300" min="0" max="600">
          <label class="anim-only hidden" style="margin-left:4px">→ до</label>
          <input type="number" id="cx_finish" value="500" min="0" max="600" class="anim-only hidden">
        </div>
        <div class="row">
          <label>y:</label>
          <input type="number" id="cy" value="300" min="0" max="600">
          <label class="anim-only hidden" style="margin-left:4px">→ до</label>
          <input type="number" id="cy_finish" value="500" min="0" max="600" class="anim-only hidden">
        </div>
      </div>

      <div id="block-scale" class="block">
        <div class="block-title">Масштаб</div>
        <div class="row">
          <label>по x:</label>
          <input type="number" id="sx" value="1" min="0.1" max="5" step="0.1">
          <label class="anim-only hidden" style="margin-left:4px">→ до</label>
          <input type="number" id="sx_finish" value="1.5" min="0.1" max="5" step="0.1" class="anim-only hidden">
        </div>
        <div class="row">
          <label>по y:</label>
          <input type="number" id="sy" value="1" min="0.1" max="5" step="0.1">
          <label class="anim-only hidden" style="margin-left:4px">→ до</label>
          <input type="number" id="sy_finish" value="1.5" min="0.1" max="5" step="0.1" class="anim-only hidden">
        </div>
      </div>

      <div id="block-rotate" class="block">
        <div class="block-title">Поворот</div>
        <div class="row">
          <label>угол:</label>
          <input type="number" id="rot" value="0" min="-360" max="360">
          <label class="anim-only hidden" style="margin-left:4px">→ до</label>
          <input type="number" id="rot_finish" value="180" min="-360" max="360" class="anim-only hidden">
        </div>
      </div>


      <div class="btn-row">
        <button class="btn-draw draw-only" onclick="doDraw()">Нарисовать</button>
        <button class="btn-clear" onclick="doClear()">Очистить</button>
        <button class="btn-anim anim-only hidden" onclick="doAnimate()">Анимировать</button>
      </div>


      <div class="row">
        <input type="checkbox" id="chk-anim" onchange="toggleAnimMode()">
        <label for="chk-anim" style="color:#000000; font-size:0.85rem;">Включить анимацию?</label>
        <select id="ease-select" class="anim-only hidden" style="margin-left:4px">
          <option value="linear">linear</option>
          <option value="elastic">elastic</option>
          <option value="bounce" selected>bounce</option>
        </select>
      </div>

      <div class="row anim-only hidden" id="row-path-mode">
        <input type="checkbox" id="chk-path" onchange="togglePathMode()">
        <label for="chk-path" style="color:#000000; font-size:0.85rem;">Перемещение вдоль пути?</label>
      </div>

      <div id="block-path" class="block hidden">
        <div class="block-title">Пути перемещения</div>
        <div class="row">
          <select id="path-type">
            <option value="0">Буквой «Г»</option>
            <option value="1">По кругу</option>
          </select>
        </div>
      </div>

    </div>

    <div class="svg-wrap">
      <svg id="main-svg"></svg>
    </div>

  </div>

</body>
</html>
